name: KBO 데이터 자동 업데이트 및 배포

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 5-14 * 3-10 *"
    - cron: "0 0 * 3-10 *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm 설치
        run: npm install -g pnpm

      - name: 의존성 설치
        run: pnpm install

      - name: 데이터 수집 스크립트 실행
        run: python -u scripts/update_data.py

      - name: 빌드
        run: pnpm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
