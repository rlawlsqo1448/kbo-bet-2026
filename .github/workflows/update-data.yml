name: KBO 데이터 자동 업데이트

on:
  # 수동 실행 가능
  workflow_dispatch:

  # 스케줄: KBO 시즌 중 (3월~10월)
  # 경기일 기준 오후 2시 ~ 밤 11시 사이 10분마다 실행 (KST)
  # cron은 UTC 기준이므로 KST -9시간 = UTC 05:00 ~ 14:00
  schedule:
    # 매일 UTC 05:00 ~ 14:00 사이 10분마다 (KST 14:00 ~ 23:00)
    - cron: "*/10 5-14 * 3-10 *"

    # 매일 아침 한 번 (KST 09:00 = UTC 00:00) - 전날 최종 결과 반영
    - cron: "0 0 * 3-10 *"

jobs:
  update:
    runs-on: ubuntu-latest

    # 동시 실행 방지
    concurrency:
      group: kbo-data-update
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 데이터 수집 스크립트 실행
        run: python scripts/update_data.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data.json
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "자동 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
